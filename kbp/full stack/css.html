<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Login Page</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <style>
        /* This simple CSS makes the grid take up the full screen height and centers items vertically */
        body { 
            background-color: #e9ecef; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
        }
    </style>
</head>
<body>

    <!-- 1. GRID SYSTEM (Centers the login box) -->
    <div class="container">
        <!-- justify-content-center puts the column right in the middle horizontally -->
        <div class="row justify-content-center">
            
            <!-- col-md-4 makes the login box take up 4 out of 12 columns (a nice size for a login form) -->
            <div class="col-md-5 col-lg-4">
                
                <!-- 2. CARD (The white box holding the form) -->
                <div class="card shadow-lg">
                    <div class="card-body p-4">
                        
                        <!-- 3. BADGE (Adding a little 'Secure' tag) -->
                        <h3 class="text-center mb-4">Login <span class="badge bg-success fs-6">Secure</span></h3>

                        <!-- The Login Form -->
                        <form>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="email" placeholder="name@example.com">
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" placeholder="********">
                            </div>

                            <!-- 4. TOOLTIP (Attached to the login button) -->
                            <button type="button" class="btn btn-primary w-100" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Check your internet connection before logging in!">
                                Sign In
                            </button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS (Required for the Tooltip to work) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Tooltip Activation Script -->
    <script>
        const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
        const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl))
    </script>

</body>
</html>
